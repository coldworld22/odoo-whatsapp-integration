      .eyebrow { font-size: 30px; font-weight: 700; letter-spacing: 4px; text-transform: uppercase; }
      .title { font-size: 98px; font-weight: 800; line-height: 1.04; }
      .subtitle { font-size: 42px; font-weight: 400; line-height: 1.32; }
      .body { font-size: 31px; font-weight: 400; }
      .pill { font-size: 32px; font-weight: 700; }
      .metric { font-size: 48px; font-weight: 800; }
      .metricLabel { font-size: 24px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
