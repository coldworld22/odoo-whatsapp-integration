  <rect width="2752" height="1536" fill="url(#bg)"/>
  <path d="M1786 0H2752V1536H1340C1636 1200 1765 750 1786 0Z" fill="#e5f6ee"/>
  <path d="M2058 0H2752V1536H1802C1990 1042 2065 532 2058 0Z" fill="#f1f5ff" opacity="0.84"/>

  <g transform="translate(132 110)" class="sans">
