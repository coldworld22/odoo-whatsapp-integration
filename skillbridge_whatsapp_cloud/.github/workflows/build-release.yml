name: Build and Artifacts

on:
  push:
    branches:
      - '15.0'
      - '16.0'
      - '17.0'
      - '18.0'
      - '19.0'
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Compile Python files
        run: |
          python -m compileall -q .

      - name: Create archives for branches
        run: |
          mkdir -p dist
          git fetch --all --prune
          make_archive() {
            branch="$1"
            git rev-parse --verify "${branch}:skillbridge_whatsapp_cloud" >/dev/null 2>&1 || return 0
            git archive --format=zip --prefix=skillbridge_whatsapp_cloud/ \
              --output="dist/skillbridge_whatsapp_cloud-${branch}.zip" \
              "${branch}:skillbridge_whatsapp_cloud"
          }
          make_archive "${GITHUB_REF_NAME}"
          # Also create archives for supported branches when run manually.
          make_archive 15.0
          make_archive 16.0
          make_archive 17.0
          make_archive 18.0
          make_archive 19.0

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: dist/
