name: Build and Artifacts

on:
  push:
    branches:
      - '17.0'
      - '18.0'
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Compile Python files
        run: |
          python -m compileall -q .

      - name: Create archives for branches
        run: |
          mkdir -p dist
          git fetch --all --prune
          git archive --format=zip --output=dist/skillbridge_whatsapp_cloud-${GITHUB_REF##*/}.zip ${GITHUB_REF##*/} || true
          # Also create archives for both supported branches when run manually
          git archive --format=zip --output=dist/skillbridge_whatsapp_cloud-17.0.zip 17.0 || true
          git archive --format=zip --output=dist/skillbridge_whatsapp_cloud-18.0.zip 18.0 || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: dist/
